<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#010714">
  <title>LYVA Community | Offline</title>
  <style>
    :root{--bg:#010714;--card:#091833;--border:rgba(50,120,220,.45);--accent:#3d8eff;--text:#e8f1ff;--muted:#7aa5d8;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top,#07142d 0,#010714 55%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .card{width:min(100%,420px);padding:28px;border:1px solid var(--border);border-radius:24px;background:rgba(9,24,51,.92);box-shadow:0 18px 40px rgba(0,0,0,.38);text-align:center}
    img{width:88px;height:auto;display:block;margin:0 auto 18px}
    h1{margin:0 0 10px;font-size:28px;letter-spacing:.04em}
    p{margin:0;color:var(--muted);line-height:1.7}
    a{display:inline-flex;margin-top:18px;padding:12px 18px;border-radius:14px;background:linear-gradient(135deg,#2678ff,#0f4fcd);color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <img src="/lyva-navbar-logo.png" alt="LYVA Community">
    <h1>Mode Offline</h1>
    <p>Koneksi internet sedang tidak tersedia. Coba buka lagi saat koneksi kembali aktif.</p>
    <a href="/">Kembali ke Home</a>
  </main>
</body>
</html>
